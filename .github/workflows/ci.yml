name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

      - name: Coverage
        run: |
          go test ./... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Docker images
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-openclaw-2026.3.11

      - name: Load or pull test image
        run: |
          if [ -f /tmp/docker-images/openclaw.tar ]; then
            docker load -i /tmp/docker-images/openclaw.tar
          else
            docker pull ghcr.io/openclaw/openclaw:2026.3.11
            mkdir -p /tmp/docker-images
            docker save ghcr.io/openclaw/openclaw:2026.3.11 -o /tmp/docker-images/openclaw.tar
          fi

      - name: Build egress proxy image
        run: docker build -t conga-egress-proxy deploy/egress-proxy/

      - name: Integration tests
        run: go test -tags integration ./internal/cmd/ -v -timeout 10m -count=1

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Init infrastructure module
        run: terraform init -backend=false
        working-directory: terraform/modules/infrastructure

      - name: Validate infrastructure module
        run: terraform validate
        working-directory: terraform/modules/infrastructure
