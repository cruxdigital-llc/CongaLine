# Customize the base_url + model name to match your environment. The
# defaults below point at a placeholder endpoint that won't resolve;
# update before first use.
version: 2
model:
  provider: openai
  name: qwen-2.5-72b-instruct
  base_url: https://litellm.internal/v1
