# role-code-dev — Opus-orchestrated dev agent with a Qwen subagent for
# mechanical work (file ops, lookups, log parsing, data crunch).
#
# Primary model: NOT overridden here — uses the runtime default
# (anthropic/claude-opus-4-* from openclaw-defaults.json). Operators who
# want a specific Opus revision should update the runtime default in
# pkg/runtime/openclaw/openclaw-defaults.json or override per-agent
# (note: the overlay's `model:` enum is currently {ollama, openai}, so
# direct anthropic overrides are not expressible in v2).
#
# Subagent: Qwen via your LLM proxy. Customize base_url + model name.
version: 2
subagents:
  model:
    provider: openai
    name: qwen-2.5-72b-instruct
    base_url: https://litellm.internal/v1
    # context_window / max_tokens: uncomment + set if your proxy enforces
    # caps tighter than the model's advertised limits.
    # context_window: 131072
    # max_tokens: 8192
  delegation_mode: prefer
  max_concurrent: 4
