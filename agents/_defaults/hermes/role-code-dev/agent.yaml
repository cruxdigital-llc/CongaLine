# role-code-dev (Hermes) — Opus-orchestrated dev agent with a Qwen subagent
# for mechanical work (file ops, lookups, log parsing, data crunch).
#
# Primary model: NOT overridden here — uses the Hermes runtime default
# (currently Anthropic Opus). The overlay's `model:` enum is {ollama,
# openai}, so direct anthropic overrides are not expressible in v2.
#
# Subagent: Qwen via your LLM proxy. Customize base_url + model name.
#
# Note: delegation_mode is OpenClaw-only and silently dropped by the
# Hermes generator (Hermes always-delegates at the runtime layer). The
# field is intentionally absent here to avoid misleading operators who
# tune it expecting an effect. Set it in the openclaw sibling instead.
version: 2
subagents:
  model:
    provider: openai
    name: qwen-2.5-72b-instruct
    base_url: https://litellm.internal/v1
    # context_window / max_tokens: uncomment + set if your proxy enforces
    # caps tighter than the model's advertised limits.
    # context_window: 131072
    # max_tokens: 8192
  max_concurrent: 4
